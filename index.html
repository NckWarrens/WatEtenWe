<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maaltijd Tools</title>
    <style>
        body {
            margin: 0;
            font-family: Inter, system-ui, sans-serif;
            background: linear-gradient(160deg, #020617, #0f172a);
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            color: #cbd5e1;
            margin-bottom: 40px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        a {
            display: block;
            padding: 18px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.2rem;
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.2);
            transition: transform 0.15s ease, background 0.15s ease;
            color: white;
        }

        a:hover {
            transform: translateY(-2px);
            background: rgba(51, 65, 85, 0.9);
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Wat eten we?</h1>
    <p>Kies hoe je je gebrek aan besluitvaardigheid wil oplossen.</p>

    <div class="links">
        <a href="roulette.html">🎰 Maaltijd Roulette</a>
        <a href="planner.html">📋 Maaltijdplanner</a>
    </div>
</div>
</body>
</html>
